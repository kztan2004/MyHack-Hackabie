services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecosystem_graph}
      POSTGRES_USER: ${POSTGRES_USER:-ecosystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecosystem}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      #- ./infra/demo_seed.sql:/docker-entrypoint-initdb.d/002_demo_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecosystem} -d ${POSTGRES_DB:-ecosystem_graph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ecosystem_graph_password}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecosystem}:${POSTGRES_PASSWORD:-ecosystem}@postgres:5432/${POSTGRES_DB:-ecosystem_graph}
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      # Add your Vercel URL and/or ngrok URL to backend/.env, e.g.:
      #   VERCEL_FRONTEND_URL=https://my-app.vercel.app
      #   NGROK_URL=https://abc123.ngrok-free.app
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173${VERCEL_FRONTEND_URL:+,$VERCEL_FRONTEND_URL}${NGROK_URL:+,$NGROK_URL}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started


volumes:
  postgres-data:
  neo4j-data:
  redis-data:
