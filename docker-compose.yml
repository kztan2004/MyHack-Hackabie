services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ecosystem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecosystem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecosystem_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ecosystem_db}
    volumes:
      - ecosystem_postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"    # External 5433 to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecosystem_user} -d ${POSTGRES_DB:-ecosystem_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Neo4j ───────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: ecosystem_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ecosystem_graph_pass}
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - ecosystem_neo4j_data:/data
      - ecosystem_neo4j_logs:/logs
    ports:
      - "7475:7474"    # Browser UI (external 7475 to avoid conflicts)
      - "7688:7687"    # Bolt protocol (external 7688)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  app:
    build: ./backend
    container_name: ecosystem_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ecosystem_user}:${POSTGRES_PASSWORD:-ecosystem_pass}@postgres:5432/${POSTGRES_DB:-ecosystem_db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-ecosystem_graph_pass}
      - APP_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app    # live reload in dev

volumes:
  ecosystem_postgres_data:
  ecosystem_neo4j_data:
  ecosystem_neo4j_logs:
